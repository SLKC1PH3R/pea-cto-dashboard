<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Folio — Hors ligne</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0e0c16;
        color: #f0edf8;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }
      h1 { font-size: 19px; margin: 0; }
      p { color: #a79fbd; font-size: 14px; max-width: 320px; margin: 0; }
      button {
        margin-top: 8px;
        border: none;
        border-radius: 11px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(140deg, #9d7bf5, #c9b6fb);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="mark" src="/folio-logo.svg" alt="Folio" width="56" height="56" />
      <h1>Pas de connexion</h1>
      <p>Folio a besoin du réseau pour afficher tes positions et cours à jour. Réessaie une fois reconnecté.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
