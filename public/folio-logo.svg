<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C5DFA;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7C5DFA;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C5DFA"/>
      <stop offset="100%" style="stop-color:#4FFFB0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowDot" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#13141A"/>

  <!-- Subtle inner border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.5" fill="none" stroke="#7C5DFA" stroke-width="0.75" stroke-opacity="0.25"/>

  <!-- Chart bars -->
  <g clip-path="url(#roundClip)">
    <!-- Bar 1 -->
    <rect x="11" y="42" width="8" height="12" rx="2" fill="url(#barGrad)"/>
    <!-- Bar 2 -->
    <rect x="22" y="34" width="8" height="20" rx="2" fill="url(#barGrad)"/>
    <!-- Bar 3 -->
    <rect x="33" y="24" width="8" height="30" rx="2" fill="url(#barGrad)"/>
    <!-- Bar 4 (tallest, accent) -->
    <rect x="44" y="14" width="8" height="40" rx="2" fill="#7C5DFA" opacity="0.55"/>

    <!-- Trend line -->
    <polyline
      points="15,40 26,31 37,21 48,12"
      fill="none"
      stroke="url(#lineGrad)"
      stroke-width="2.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#glow)"
    />

    <!-- Start dot (violet) -->
    <circle cx="15" cy="40" r="2.2" fill="#7C5DFA" opacity="0.9"/>

    <!-- Peak dot (mint green glow) -->
    <circle cx="48" cy="12" r="3" fill="#4FFFB0" filter="url(#glowDot)"/>
  </g>
</svg>
